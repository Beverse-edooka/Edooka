# Railway deploy — REQUIRED: set service Root Directory to `edooka` in Railway dashboard.
# (If root is the parent repo folder, npm ci uses the wrong lockfile and Node 18.)

[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm run build"

[build.env]
NIXPACKS_NODE_VERSION = "20"
NIXPACKS_INSTALL_CMD = "npm install"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
