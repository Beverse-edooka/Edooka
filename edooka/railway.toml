# Railway deploy config — set the service Root Directory to `edooka` in the dashboard
# when the git repo root is the parent `Edooka/` folder.

[build]
builder = "NIXPACKS"
# Use npm install if npm ci fails on lockfile drift; root package.json also has build/start fallbacks.
buildCommand = "npm install && npm run build"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
